<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VP9 test</title>
</head>

<body>
    <button id="trigger">Toggle videos</button>
    <canvas id="canvas" width="32" height="32"></canvas>
    <div id="info"></div>
    <div id="container"></div>
    <script>
        const VIDEO_COUNT = 100;
        const VIDEO_URL = new URLSearchParams(window.location.search).get('video') || './assets/test.webm';

        const container = document.getElementById('container');
        const trigger = document.getElementById('trigger');
        const canvas = document.getElementById('canvas');
        const info = document.getElementById('info');

        let lastFrameTime = performance.now();
        let maxFrameTime = 0;
        window.globalVideoArray = [];

        trigger.addEventListener('click', () => {
            maxFrameTime = 0;
            info.innerHTML = '';

            if (container.children.length) {
                while (container.firstChild) {
                    container.removeChild(container.firstChild);
                }
                return;
            }

            for (let i = 0; i < VIDEO_COUNT + 1; i++) {
                const video = document.createElement('video');
                video.src = VIDEO_URL;
                video.autoplay = true;
                video.loop = true;
                video.muted = true;
                
                video.addEventListener('loadstart', function() {
                    console.log('Video loading started');
                });
                
                window.globalVideoArray.push(video);
                container.appendChild(video);
            }
        });

        let frame = 0;
        let animationId;
        
        function draw() {
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.font = '20px Arial';
            ctx.fillText(frame, 10, 20);
            frame = (frame + 1) % 101;

            const now = performance.now();
            const frameTime = now - lastFrameTime;
            lastFrameTime = now;
            
            if (frameTime > maxFrameTime) {
                maxFrameTime = frameTime;
                info.innerHTML = `Max frame time: ${maxFrameTime.toFixed(2)}ms`;
            }

            requestAnimationFrame(draw);
        }
        
        draw();
        
        function createInterval() {
            setInterval(() => {
                console.log('Logging...');
            }, 1000);
        }
        createInterval();
        
        function handleResize() {
            const start = Date.now();
            while (Date.now() - start < 100) {
            }
        }
        
        window.addEventListener('resize', handleResize);
        
        document.getElementById('composer').addEventListener('click', () => {
            console.log('Element clicked');
        });
    </script>
</body>

</html>
